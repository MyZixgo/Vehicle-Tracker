<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ดูสถานะ</title>

<style>
body {
    font-family: Arial;
    background: #eaeaea;
    padding: 10px;
}

.container {
    max-width: 480px;
    margin: auto;
    background: #fff;
    border: 1px solid #999;
    padding: 12px;
}

/* HEADER */
.header {
    background: #1f9bcf;
    text-align: center;
    font-weight: bold;
    padding: 10px;
    border: 1px solid #666;
    margin-bottom: 10px;
}

/* BOX */
.box {
    border: 1px solid #999;
    padding: 8px;
    margin-bottom: 6px;
    background: #f7f7f7;
}

/* STATUS */
.status {
    padding: 8px;
    text-align: center;
    font-weight: bold;
    color: #fff;
}

.green { background: #4CAF50; }
.red { background: #f44336; }

/* TITLE */
.title {
    font-weight: bold;
    margin-top: 10px;
}

/* LOADING */
.loading {
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">ดูสถานะ</div>

    <div id="loading" class="loading">⏳ กำลังโหลดข้อมูล...</div>

    <div id="result"></div>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>

let lineUserId = "";

// ✅ LIFF INIT
async function initLIFF() {
    await liff.init({ liffId: "2010252840-W9xfHpkL" });

    if (!liff.isLoggedIn()) {
        liff.login();
        return;
    }

    lineUserId = liff.getContext().userId;

    console.log("LINE:", lineUserId);

    loadData(); // ✅ AUTO CALL
}

// ✅ STATUS
function calcStatus(dateStr) {

    if (!dateStr) return { text: "ไม่มีข้อมูล", class: "" };

    const today = new Date();
    const expire = new Date(dateStr);

    today.setHours(0,0,0,0);
    expire.setHours(0,0,0,0);

    const diff = Math.ceil((expire - today) / (1000*60*60*24));

    if (diff < 0) {
        return { text: "หมดอายุแล้ว " + Math.abs(diff) + " วัน ❌", class: "red" };
    } else if (diff <= 30) {
        return { text: "ใกล้หมดอายุ " + diff + " วัน ⚠️", class: "red" };
    } else {
        return { text: "ปกติ เหลือ " + diff + " วัน ✅", class: "green" };
    }
}

// ✅ LOAD DATA
async function loadData() {

    const FLOW_URL = "https://defaultd9cd485e39bd4cc995398c97631fbb.71.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e956bcde13174c05af2135ecb803afb0/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=LhaHiFXFK4DELoAH-b_uS2rHw28czoPo-BCElqc-LLo"; // ✅ YOUR FLOW

    try {

        const res = await fetch(FLOW_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                lineUserId: lineUserId
            })
        });

        const data = await res.json();

        document.getElementById("loading").style.display = "none";

        if (!data || data.length === 0) {
            document.getElementById("result").innerHTML =
                "<div class='box'>❌ ไม่พบข้อมูลการลงทะเบียน</div>";
            return;
        }

        // ✅ RENDER MULTI CAR
        let html = "";

        data.forEach((d, index) => {

            const ins = calcStatus(d.inspectionDate);
            const lic = calcStatus(d.licenseExpireDate);

            html += `
                <div class="box">

                    <div class="title">รถคันที่ ${index+1}</div>

                    <div class="box">${d.carOrder || "-"}</div>

                    <div class="box">1. ประเภท: ${d.vehicleType || "-"}</div>
                    <div class="box">2. ยี่ห้อ: ${d.brand || "-"}</div>
                    <div class="box">3. รุ่น: ${d.model || "-"}</div>
                    <div class="box">4. สี: ${d.carColor || "-"}</div>
                    <div class="box">5. ทะเบียน: ${d.plateNo || "-"}</div>
                    <div class="box">6. จังหวัด: ${d.province || "-"}</div>

                    <div class="title">ข้อมูลใบอนุญาต</div>

                    <div class="box">
                        ภาษี
                        <div class="status ${ins.class}">
                            ${ins.text}
                        </div>
                    </div>

                    <div class="box">
                        ใบขับขี่
                        <div class="status ${lic.class}">
                            ${lic.text}
                        </div>
                    </div>

                </div>
            `;
        });

        document.getElementById("result").innerHTML = html;

    } catch (err) {
        console.error(err);
        alert("❌ โหลดข้อมูลไม่สำเร็จ");
    }
}

// INIT
initLIFF();

</script>

</body>
</html>
