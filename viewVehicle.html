<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ดูสถานะ</title>

<style>
body {
    font-family: Arial;
    background: #eaeaea;
    padding: 10px;
}

.container {
    max-width: 480px;
    margin: auto;
    background: #fff;
    border: 1px solid #999;
    padding: 12px;
}

/* HEADER */
.header {
    background: #1f9bcf;
    color: #000;
    text-align: center;
    font-weight: bold;
    padding: 10px;
    border: 1px solid #666;
    margin-bottom: 10px;
}

/* LABEL */
.section-title {
    font-weight: bold;
    margin-top: 10px;
}

/* BOX */
.box {
    border: 1px solid #999;
    padding: 8px;
    margin-bottom: 5px;
    background: #f8f8f8;
}

/* STATUS BAR */
.status {
    padding: 8px;
    text-align: center;
    font-weight: bold;
    color: #fff;
}

.green {
    background: #4CAF50;
}

.red {
    background: #f44336;
}

/* SEARCH */
input {
    width: 100%;
    padding: 8px;
    margin-bottom: 5px;
    border: 1px solid #999;
}

button {
    width: 100%;
    padding: 10px;
    font-weight: bold;
    background: #e67e22;
    border: none;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">ดูสถานะ</div>

    <!-- SEARCH -->
    <input type="text" id="empCode" placeholder="รหัสพนักงาน">
    <button onclick="searchData()">ค้นหา</button>

    <div id="result" style="display:none;">

        <!-- รถ -->
        <div class="section-title">รถยนต์:</div>
        <div class="box" id="carOrder"></div>

        <!-- รายละเอียด -->
        <div class="section-title">รายละเอียดรถ:</div>

        <div class="box" id="vehicleType"></div>
        <div class="box" id="brand"></div>
        <div class="box" id="model"></div>
        <div class="box" id="color"></div>
        <div class="box" id="plate"></div>
        <div class="box" id="province"></div>

        <!-- ใบอนุญาต -->
        <div class="section-title">ข้อมูลใบอนุญาต:</div>

        <div class="box">
            1. วันภาษีหมดอายุ
            <div id="inspectionStatus" class="status"></div>
        </div>

        <div class="box">
            2. วันใบขับขี่หมดอายุ
            <div id="licenseStatus" class="status"></div>
        </div>

    </div>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>

let lineUserId = "";

// ✅ LIFF
async function initLIFF() {
    await liff.init({ liffId: "2010252840-W9xfHpkL" });

    if (!liff.isLoggedIn()) {
        liff.login();
        return;
    }

    lineUserId = liff.getContext().userId;
}

// ✅ Status Logic
function calcStatus(dateStr) {

    if (!dateStr) return { text: "ไม่มีข้อมูล", class: "" };

    const today = new Date();
    const expire = new Date(dateStr);

    today.setHours(0,0,0,0);
    expire.setHours(0,0,0,0);

    const diff = Math.ceil((expire - today) / (1000*60*60*24));

    if (diff < 0) {
        return {
            text: "หมดอายุแล้ว " + Math.abs(diff) + " วัน ❌",
            class: "red"
        };
    } else if (diff <= 30) {
        return {
            text: "จะหมดอายุอีก " + diff + " วัน ⚠️",
            class: "red"
        };
    } else {
        return {
            text: "ปกติ เหลือ " + diff + " วัน ✅",
            class: "green"
        };
    }
}

// ✅ SEARCH
async function searchData() {

    const empCode = document.getElementById("empCode").value;

    if (!empCode) {
        alert("กรุณากรอกรหัสพนักงาน");
        return;
    }

    const FLOW_URL = "https://defaultd9cd485e39bd4cc995398c97631fbb.71.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e956bcde13174c05af2135ecb803afb0/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=LhaHiFXFK4DELoAH-b_uS2rHw28czoPo-BCElqc-LLo"; // ✅ ใส่ Flow

    try {

        const res = await fetch(FLOW_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                empCode: empCode,
                lineUserId: lineUserId
            })
        });

        const data = await res.json();

        if (!data || data.length === 0) {
            alert("ไม่พบข้อมูล");
            return;
        }

        const d = data[0];

        document.getElementById("result").style.display = "block";

        // ✅ car
        document.getElementById("carOrder").innerText = d.carOrder;

        // ✅ vehicle
        document.getElementById("vehicleType").innerText = "1. ประเภท: " + d.vehicleType;
        document.getElementById("brand").innerText = "2. ยี่ห้อ: " + d.brand;
        document.getElementById("model").innerText = "3. รุ่น: " + d.model;
        document.getElementById("color").innerText = "4. สีรถ: " + d.carColor;
        document.getElementById("plate").innerText = "5. ทะเบียน: " + d.plateNo;
        document.getElementById("province").innerText = "6. จังหวัด: " + d.province;

        // ✅ status
        const ins = calcStatus(d.inspectionDate);
        const lic = calcStatus(d.licenseExpireDate);

        const insEl = document.getElementById("inspectionStatus");
        const licEl = document.getElementById("licenseStatus");

        insEl.innerText = ins.text;
        insEl.className = "status " + ins.class;

        licEl.innerText = lic.text;
        licEl.className = "status " + lic.class;

    } catch (err) {
        console.error(err);
        alert("เกิดข้อผิดพลาด");
    }
}

// INIT
initLIFF();

</script>

</body>
</html>
