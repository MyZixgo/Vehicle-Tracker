<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ดูสถานะ</title>

<style>
body {
    font-family: Arial;
    background: #eaeaea;
    padding: 10px;
}

.container {
    max-width: 480px;
    margin: auto;
    background: #fff;
    border: 1px solid #999;
    padding: 12px;
}

.header {
    background: #1f9bcf;
    text-align: center;
    font-weight: bold;
    padding: 10px;
    border: 1px solid #666;
    margin-bottom: 10px;
}

.summary {
    background: #e67e22;
    text-align: center;
    font-weight: bold;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #999;
}

.section-title {
    font-weight: bold;
    margin-top: 10px;
}

.box {
    border: 1px solid #999;
    padding: 8px;
    margin-bottom: 5px;
    background: #f8f8f8;
}

.inner-box {
    border: 1px solid #ccc;
    padding: 6px;
    margin-bottom: 4px;
    background: #fafafa;
}

.status {
    padding: 8px;
    text-align: center;
    font-weight: bold;
    color: #fff;
}

.green { background: #4CAF50; }
.red { background: #f44336; }

</style>
</head>

<body>

<div class="container">
    <div class="header">ดูสถานะ</div>

    <div id="loading">⏳ กำลังโหลดข้อมูล...</div>
    <div id="result"></div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>

let lineUserId = "";

// ✅ INIT LIFF
async function initLIFF() {
    await liff.init({ liffId: "2010252840-W9xfHpkL" });

    if (!liff.isLoggedIn()) {
        liff.login();
        return;
    }

    lineUserId = liff.getContext().userId;

    console.log("LINE:", lineUserId);

    loadData();
}

// ✅ STATUS
function calcStatus(dateStr) {

    if (!dateStr) return { text: "ไม่มีข้อมูล", class: "" };

    const today = new Date();
    const expire = new Date(dateStr);

    today.setHours(0,0,0,0);
    expire.setHours(0,0,0,0);

    const diff = Math.ceil((expire - today)/(1000*60*60*24));

    if (diff < 0) {
        return { text: "หมดอายุแล้ว " + Math.abs(diff) + " วัน ❌", class: "red" };
    } else if (diff <= 30) {
        return { text: "ใกล้หมดอายุ " + diff + " วัน ⚠️", class: "red" };
    } else {
        return { text: "ปกติ " + diff + " วัน ✅", class: "green" };
    }
}

// ✅ LOAD DATA
async function loadData() {

    const FLOW_URL = "https://defaultd9cd485e39bd4cc995398c97631fbb.71.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e956bcde13174c05af2135ecb803afb0/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=LhaHiFXFK4DELoAH-b_uS2rHw28czoPo-BCElqc-LLo";

    try {

        const res = await fetch(FLOW_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                lineUserId: lineUserId
            })
        });

        const response = await res.json();

        console.log("FLOW RESPONSE:", response);

        const list = (response && response.items) ? response.items : [];

        document.getElementById("loading").style.display = "none";

        if (list.length === 0) {
            document.getElementById("result").innerHTML =
                "<div class='box'>❌ ไม่พบข้อมูลการลงทะเบียน</div>";
            return;
        }

        let html = "";

        // ✅ SUMMARY
        html += `
            <div class="summary">
                🚗 จำนวนรถที่ลงทะเบียน: ${list.length} คัน
            </div>
        `;

        list.forEach((d, index) => {

            const ins = calcStatus(d.inspectionDate);
            const lic = calcStatus(d.licenseExpireDate);

            html += `
                <div class="box">

                    <div class="section-title">${d.carOrder || "ข้อมูลรถ"}</div>

                    <div class="section-title">รายละเอียดรถ</div>
                    <div class="inner-box">ประเภท: ${d.vehicleType || "-"}</div>
                    <div class="inner-box">ยี่ห้อ: ${d.brand || "-"}</div>
                    <div class="inner-box">รุ่น: ${d.model || "-"}</div>
                    <div class="inner-box">สี: ${d.carColor || "-"}</div>
                    <div class="inner-box">ทะเบียน: ${d.plateNo || "-"}</div>
                    <div class="inner-box">จังหวัด: ${d.province || "-"}</div>

                    <div class="section-title">ข้อมูลใบอนุญาต</div>

                    <div class="box">
                        ภาษี
                        <div class="status ${ins.class}">
                            ${ins.text}
                        </div>
                    </div>

                    <div class="box">
                        ใบขับขี่
                        <div class="status ${lic.class}">
                            ${lic.text}
                        </div>
                    </div>

                </div>

                <hr style="margin:10px 0; border:none; border-top:1px dashed #aaa;">
            `;
        });

        document.getElementById("result").innerHTML = html;

    } catch (err) {
        console.error(err);
        alert("❌ โหลดข้อมูลไม่สำเร็จ");
    }
}

// START
initLIFF();

</script>

</body>
</html>
