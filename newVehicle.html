<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ลงทะเบียนรถพนักงาน</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 10px;
            background: #f2f2f2;
        }

        .container {
            max-width: 480px;
            margin: auto;
            background: #fff;
            border: 1px solid #bdbdbd;
            padding: 12px;
        }

        .header {
            background: #e67e22;
            color: #000;
            text-align: center;
            font-weight: bold;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #999;
        }

        .section-title {
            font-weight: bold;
            margin: 15px 0 8px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            font-weight: 600;
        }

        input:not([type="radio"]),
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #999;
            font-size: 14px;
            background: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        .status {
            padding: 8px;
            text-align: center;
            font-weight: bold;
            color: #fff;
            margin: 8px 0;
            font-size: 13px;
        }

        .green {
            background: #4caf50;
        }

        .red {
            background: #f44336;
        }

        .btn-save {
            width: 100%;
            background: #e67e22;
            color: #000;
            border: 1px solid #999;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }

        .btn-save:hover {
            opacity: 0.9;
        }

        .hidden {
            display: none;
        }

        .hint {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .section-title {
            background: #fff;
            color: #2f75b5;
            padding: 8px;
            font-weight: bold;
            border-bottom: 1px solid #1f4e79;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .consent-group label.consent-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .consent-group input[type="radio"] {
            margin: 0;
            transform: scale(1.2);
            /* ขยายวงกลมให้ง่ายต่อการกด */
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">ลงทะเบียน</div>

        <!-- ข้อมูลพนักงาน -->
        <div class="section-title">ข้อมูลพนักงาน</div>

        <div class="form-group">
            <label for="empCode">รหัสพนักงาน</label>
            <!-- <input type="text" id="empCode" placeholder="เช่น 123456" /> -->
            <input type="text" id="empCode" placeholder="เช่น 123456" inputmode="numeric" maxlength="10"
                pattern="[0-9]*" />

        </div>

        <div class="form-group">
            <label for="empName">ชื่อพนักงาน</label>
            <input type="text" id="empName" placeholder="ชื่อ-นามสกุล" />
        </div>

        <div class="form-group">
            <label for="phone">เบอร์ติดต่อ</label>
            <input type="tel" id="phone" placeholder="เช่น 0812345678" />
        </div>

        <!-- ข้อมูลรถ -->
        <div class="section-title">ข้อมูลรถ</div>

        <div class="form-group">
            <label for="vehicleType">ประเภทรถ</label>
            <select id="vehicleType">
                <option value="">-- เลือก --</option>
                <option value="รถยนต์">รถยนต์</option>
                <option value="รถจักรยานยนต์">รถจักรยานยนต์</option>
            </select>
        </div>

        <div class="form-group">
            <label for="carOrder">ลำดับรถ</label>
            <select id="carOrder">
                <option value="">-- เลือก --</option>
                <option value="คันที่ 1">คันที่ 1</option>
                <option value="คันที่ 2">คันที่ 2</option>
                <option value="คันที่ 3">คันที่ 3</option>
                <option value="คันที่ 4">คันที่ 4</option>
            </select>
        </div>

        <div class="form-group hidden" id="carOrderOtherGroup">
            <label for="carOrderOther">ระบุลำดับรถเพิ่มเติม</label>
            <input type="text" id="carOrderOther" placeholder="เช่น คันสำรอง / คันพ่วง" />
        </div>

        <div class="form-group">
            <label for="brand">ยี่ห้อ</label>
            <select id="brand" disabled>
                <option value="">-- เลือกประเภทรถก่อน --</option>
            </select>
        </div>

        <div class="form-group hidden" id="brandOtherGroup">
            <label for="brandOther">ระบุยี่ห้ออื่นๆ</label>
            <input type="text" id="brandOther" placeholder="กรอกยี่ห้อรถ" />
        </div>

        <div class="form-group">
            <label for="model">รุ่น</label>
            <select id="model" disabled>
                <option value="">-- เลือกยี่ห้อก่อน --</option>
            </select>
        </div>

        <div class="form-group hidden" id="modelOtherGroup">
            <label for="modelOther">ระบุรุ่นอื่นๆ</label>
            <input type="text" id="modelOther" placeholder="กรอกรุ่นรถ" />
        </div>

        <div class="form-group">
            <label for="carColor">สีรถ</label>
            <input type="text" id="carColor" placeholder="เช่น ดำ, ขาว, เทา" />
        </div>

        <div class="form-group">
            <label for="plateNo">เลขทะเบียน</label>
            <input type="text" id="plateNo" placeholder="เช่น กข1234" />
        </div>

        <div class="form-group">
            <label for="province">จังหวัดทะเบียน</label>
            <select id="province">
                <option value="">-- เลือกจังหวัด --</option>
            </select>
        </div>

        <!-- ข้อมูลกฎหมาย -->
        <div class="section-title">ข้อมูลกฎหมาย</div>

        <div class="form-group">
            <label for="inspectionDate">วันภาษีหมดอายุ</label>
            <input type="date" id="inspectionDate" />
        </div>

        <div class="form-group">
            <label>แนบรูปภาษีรถ (ป้ายวงกลม)</label>
            <input type="file" id="taxImage" accept="image/*" onchange="previewImage(event, 'taxPreview')" />
            <img id="taxPreview" class="hidden" style="width:100%; margin-top:5px; border:1px solid #ccc;" />
        </div>

        <div class="status" id="inspectionStatus">ยังไม่ได้เลือกวันที่</div>

        <div class="form-group">
            <label for="licenseExpireDate">วันใบขับขี่หมดอายุ</label>
            <input type="date" id="licenseExpireDate" />
        </div>

        <div class="form-group">
            <label>แนบรูปใบขับขี่</label>
            <input type="file" id="licenseImage" accept="image/*" onchange="previewImage(event, 'licensePreview')" />
            <img id="licensePreview" class="hidden" style="width:100%; margin-top:5px; border:1px solid #ccc;" />
        </div>

        <div class="status" id="licenseStatus">ยังไม่ได้เลือกวันที่</div>

        <div class="section-title">นโยบายความเป็นส่วนตัว</div>

        <div class="form-group consent-group">

            <label class="consent-item">
                <input type="radio" name="consent" value="agree">
                <span>✅ ยินยอมให้เปิดเผยข้อมูล ทะเบียนรถ / ใบขับขี่</span>
            </label>

            <label class="consent-item">
                <input type="radio" name="consent" value="disagree">
                <span>❌ ไม่ยินยอมให้เปิดเผยข้อมูล</span>
            </label>

        </div>


        <button class="btn-save" type="button" onclick="submitForm()">บันทึก</button>

    </div>

    <!-- Get line ID from LIFF  -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script>
        // ===== Master Data =====
        const vehicleData = {
            "รถยนต์": {
                "Toyota": ["Yaris ATIV", "Yaris Cross", "Corolla Altis", "Corolla Cross", "Camry", "Hilux Revo", "Hilux Champ", "Vigo Champ", "Fortuner", "Innova Zenix", "อื่นๆ"],
                "Honda": ["City", "Civic", "Accord", "BR-V", "HR-V", "CR-V", "WR-V", "อื่นๆ"],
                "Nissan": ["Almera", "Kicks e-POWER", "Navara", "Terra", "อื่นๆ"],
                "Isuzu": ["D-MAX", "MU-X", "อื่นๆ"],
                "Mitsubishi": ["Attrage", "Xpander", "Triton", "Pajero Sport", "อื่นๆ"],
                "Mazda": ["Mazda2", "Mazda3", "CX-3", "CX-30", "CX-5", "BT-50", "อื่นๆ"],
                "Suzuki": ["Swift", "Ciaz", "Ertiga", "XL7", "Carry", "อื่นๆ"],
                "BYD": ["Dolphin", "Atto 3", "Seal", "Sealion 6", "M6", "อื่นๆ"],
                "MG": ["MG4", "MG5", "ZS", "HS", "EXTENDER", "อื่นๆ"],
                "GWM": ["ORA Good Cat", "Haval H6", "Tank 300", "Poer", "อื่นๆ"],
                "อื่นๆ": ["อื่นๆ"]
            },
            "รถจักรยานยนต์": {
                "Honda": ["Wave 110i", "Wave 125i", "Dream", "Scoopy", "Click", "PCX", "ADV160", "Forza", "CB150R", "CRF", "อื่นๆ"],
                "Yamaha": ["Finn", "Fazzio", "Grand Filano", "Aerox", "NMAX", "R15", "MT-15", "XMAX", "อื่นๆ"],
                "Kawasaki": ["Ninja 250", "Ninja 400", "Z250", "Z400", "KLX", "KSR", "อื่นๆ"],
                "Suzuki": ["Smash", "Raider", "Burgman", "V-Strom", "อื่นๆ"],
                "GPX": ["Drone", "Legend", "Demon", "GR200R", "อื่นๆ"],
                "อื่นๆ": ["อื่นๆ"]
            }
        };

        const thaiProvinces = [
            "กรุงเทพมหานคร", "กระบี่", "กาญจนบุรี", "กาฬสินธุ์", "กำแพงเพชร", "ขอนแก่น",
            "จันทบุรี", "ฉะเชิงเทรา", "ชลบุรี", "ชัยนาท", "ชัยภูมิ", "ชุมพร",
            "เชียงราย", "เชียงใหม่", "ตรัง", "ตราด", "ตาก", "นครนายก",
            "นครปฐม", "นครพนม", "นครราชสีมา", "นครศรีธรรมราช", "นครสวรรค์", "นนทบุรี",
            "นราธิวาส", "น่าน", "บึงกาฬ", "บุรีรัมย์", "ปทุมธานี", "ประจวบคีรีขันธ์",
            "ปราจีนบุรี", "ปัตตานี", "พระนครศรีอยุธยา", "พะเยา", "พังงา", "พัทลุง",
            "พิจิตร", "พิษณุโลก", "เพชรบุรี", "เพชรบูรณ์", "แพร่", "ภูเก็ต",
            "มหาสารคาม", "มุกดาหาร", "แม่ฮ่องสอน", "ยะลา", "ยโสธร", "ระนอง",
            "ระยอง", "ราชบุรี", "ลพบุรี", "ลำปาง", "ลำพูน", "เลย",
            "ศรีสะเกษ", "สกลนคร", "สงขลา", "สตูล", "สมุทรปราการ", "สมุทรสงคราม",
            "สมุทรสาคร", "สระแก้ว", "สระบุรี", "สิงห์บุรี", "สุโขทัย", "สุพรรณบุรี",
            "สุราษฎร์ธานี", "สุรินทร์", "หนองคาย", "หนองบัวลำภู", "อ่างทอง", "อุดรธานี",
            "อุตรดิตถ์", "อุทัยธานี", "อุบลราชธานี", "อำนาจเจริญ"
        ];

        // ===== Elements =====
        const vehicleTypeSelect = document.getElementById("vehicleType");
        const brandSelect = document.getElementById("brand");
        const modelSelect = document.getElementById("model");

        // ===== Province =====
        function populateProvinces() {
            thaiProvinces.forEach(p => {
                const option = document.createElement("option");
                option.value = p;
                option.textContent = p;
                document.getElementById("province").appendChild(option);
            });
        }

        // ===== Reset =====
        function resetSelect(select, text) {
            select.innerHTML = `<option value="">${text}</option>`;
        }

        // ===== Vehicle Type =====
        vehicleTypeSelect.addEventListener("change", function () {
            resetSelect(brandSelect, "-- เลือกยี่ห้อ --");
            resetSelect(modelSelect, "-- เลือกยี่ห้อก่อน --");
            brandSelect.disabled = !this.value;
            modelSelect.disabled = true;

            if (vehicleData[this.value]) {
                Object.keys(vehicleData[this.value]).forEach(b => {
                    brandSelect.innerHTML += `<option value="${b}">${b}</option>`;
                });
            }
        });

        // ===== Brand =====
        brandSelect.addEventListener("change", function () {
            resetSelect(modelSelect, "-- เลือกรุ่น --");
            modelSelect.disabled = !this.value;

            const type = vehicleTypeSelect.value;
            const brand = this.value;

            if (vehicleData[type] && vehicleData[type][brand]) {
                vehicleData[type][brand].forEach(m => {
                    modelSelect.innerHTML += `<option value="${m}">${m}</option>`;
                });
            }
        });

        // ===== Preview =====
        function previewImage(event, id) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById(id);
                img.src = e.target.result;
                img.classList.remove("hidden");
            };
            reader.readAsDataURL(file);
        }

        // ===== Disable Save Logic =====
        function checkFormReady() {
            const tax = document.getElementById("taxImage").files.length;
            const license = document.getElementById("licenseImage").files.length;
            const consent = document.querySelector('input[name="consent"]:checked');
            const btn = document.querySelector(".btn-save");

            if (tax === 0 || license === 0 || !consent) {
                btn.disabled = true;
                btn.style.opacity = 0.5;
            } else {
                btn.disabled = false;
                btn.style.opacity = 1;
            }
        }

        document.getElementById("taxImage").addEventListener("change", checkFormReady);
        document.getElementById("licenseImage").addEventListener("change", checkFormReady);
        document.querySelectorAll('input[name="consent"]').forEach(el => {
            el.addEventListener("change", checkFormReady);
        });

        // ===== LIFF =====
        let lineUserId = "";

        async function initLIFF() {
            try {
                await liff.init({ liffId: "2010252840-oCJZa5Dk" });

                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }

                const context = liff.getContext();
                lineUserId = context.userId;

            } catch (err) {
                alert("LIFF Error: " + err.message);
            }
        }

        // ===== Submit =====
        async function submitForm() {
            document.body.classList.add("loading");

            const btn = document.querySelector(".btn-save");

            try {
                // ✅ LINE check
                if (!lineUserId) {
                    alert("❌ ยังไม่ได้รับ LINE userId");
                    return;
                }

                // ✅ Consent
                const consentEl = document.querySelector('input[name="consent"]:checked');
                if (!consentEl) {
                    alert("⚠️ กรุณาเลือก Consent");
                    return;
                }

                const consentValue = consentEl.value;

                // ✅ Validate
                const empCode = document.getElementById("empCode").value.trim();
                const empName = document.getElementById("empName").value.trim();

                if (!/^\d{1,10}$/.test(empCode)) {
                    alert("❌ รหัสพนักงานไม่ถูกต้อง");
                    return;
                }

                if (!empCode || !empName) {
                    alert("❌ กรอกข้อมูลไม่ครบ");
                    return;
                }

                // ✅ Files
                const taxFile = document.getElementById("taxImage").files[0];
                const licenseFile = document.getElementById("licenseImage").files[0];

                if (!taxFile || !licenseFile) {
                    alert("❌ แนบรูปไม่ครบ");
                    return;
                }

                btn.disabled = true;
                btn.textContent = "กำลังบันทึก...";

                const toBase64 = file => new Promise(res => {
                    const reader = new FileReader();
                    reader.onload = () => res(reader.result);
                    reader.readAsDataURL(file);
                });

                const taxBase64 = await toBase64(taxFile);
                const licenseBase64 = await toBase64(licenseFile);

                // ✅ Mask ถ้าไม่ยินยอม
                function maskPlate(p) {
                    return p ? p.substring(0, 4) + "xx" : "";
                }

                const plateNo = consentValue === "disagree"
                    ? maskPlate(document.getElementById("plateNo").value)
                    : document.getElementById("plateNo").value;

                // ===== DATA =====
                const data = {
                    empCode,
                    empName,
                    phone: document.getElementById("phone").value,
                    lineUserId,
                    consent: consentValue,
                    vehicleType: vehicleTypeSelect.value,
                    brand: brandSelect.value,
                    model: modelSelect.value,
                    plateNo: plateNo,
                    province: document.getElementById("province").value,
                    taxImageBase64: taxBase64,
                    licenseImageBase64: licenseBase64
                };

                await fetch("YOUR_FLOW_URL_HERE", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                alert("✅ บันทึกสำเร็จ");

                if (liff.isInClient()) liff.closeWindow();

            } catch (err) {
                alert("❌ Error");
                console.error(err);
            }
            finally {
                document.body.classList.remove("loading");
                btn.disabled = false;
                btn.textContent = "บันทึก";
            }
        }

        // ===== Init =====
        window.onload = function () {
            populateProvinces();
            initLIFF();
            checkFormReady();
        };

    </script>
</body>

</html>
